name: liquidation-keeper

on:
  schedule:
    - cron: "*/5 * * * *" # every 5 minutes (GitHub may delay under load)
  workflow_dispatch: {}

concurrency:
  group: keeper
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: keeper/package-lock.json

      - name: Install keeper dependencies
        working-directory: keeper
        run: npm ci

      - name: Run liquidation scan
        working-directory: keeper
        env:
          KEEPER_PRIVATE_KEY: ${{ secrets.KEEPER_PRIVATE_KEY }}
          SEPOLIA_RPC_URL: https://ethereum-sepolia-rpc.publicnode.com
          PERP_ENGINE_ADDRESS: ${{ vars.PERP_ENGINE_ADDRESS }}
          LIQUIDATION_ENGINE_ADDRESS: ${{ vars.LIQUIDATION_ENGINE_ADDRESS }}
          MAX_SCAN: "500"
          RUN_ONCE: "1"
        run: npm start
